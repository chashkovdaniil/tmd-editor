name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and build
        run: npm run ci:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmd-editor-dist
          path: |
            dist/main.js
            dist/manifest.json
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and build
        run: npm run ci:build

      - name: Prepare release metadata
        id: metadata
        run: |
          version="$(node -p "require('./manifest.json').version")"
          short_sha="${GITHUB_SHA::7}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Create plugin archive
        run: |
          archive="tmd-editor-${{ steps.metadata.outputs.version }}-${{ steps.metadata.outputs.short_sha }}.zip"
          (cd dist && zip -r "../${archive}" main.js manifest.json)
          echo "PLUGIN_ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: tmd-editor ${{ steps.metadata.outputs.version }} (${{ steps.metadata.outputs.short_sha }})
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/main.js
            dist/manifest.json
            ${{ env.PLUGIN_ARCHIVE }}
